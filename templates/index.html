<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LuxuryVision Online</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header>
    <h1>LuxuryVision Online</h1>
</header>

<main>

    <div class="upload-box">

        <!-- ANTEPRIMA -->
        <div id="preview-container"></div>

        <!-- FORM SOLO PER L'IMMAGINE (per ora niente Flow) -->
        <form id="imageForm" enctype="multipart/form-data" onsubmit="return false;">

            <!-- UPLOAD / INCOLLA -->
            <label class="upload-area">
                <input type="file" name="image" accept="image/*" id="imageInput" required>
                <span>Clicca o incolla un'immagine</span>
            </label>

        </form>
    </div>

    <!-- BLOCCO ANALISI / PROMPT -->
    <div class="result-box" id="analysis-box" style="display:none;">
        <h2>Prompt generato (LuxuryVision)</h2>
        <textarea id="generated_prompt" class="textarea-gold" rows="8"></textarea>
        <button type="button" class="action-btn" id="copyPromptBtn">Copia prompt</button>
    </div>

</main>

<!-- SCRIPT: ANTEPRIMA + ANALISI AUTOMATICA + COPIA PROMPT -->
<script>
// --- ANTEPRIMA IMMAGINE ---
function showPreview(blob) {
    const reader = new FileReader();
    reader.onload = function(e) {
        let preview = document.getElementById("preview");
        if (!preview) {
            preview = document.createElement("img");
            preview.id = "preview";
            preview.style.maxWidth = "100%";
            preview.style.border = "2px solid #c9a44f";
            preview.style.borderRadius = "10px";
            preview.style.marginBottom = "20px";
            document.getElementById("preview-container").appendChild(preview);
        }
        preview.src = e.target.result;
    };
    reader.readAsDataURL(blob);
}

// --- CHIAMATA API ANALISI ---
async function analyzeImage(file) {
    const formData = new FormData();
    formData.append("image", file);

    const res = await fetch("/api/analyze", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (data.prompt) {
        const box = document.getElementById("analysis-box");
        const ta = document.getElementById("generated_prompt");
        ta.value = data.prompt;
        box.style.display = "block";
    } else if (data.error) {
        alert("Errore analisi: " + data.error);
    }
}

// --- DOPO UPLOAD FILE ---
const imageInput = document.getElementById("imageInput");
imageInput.addEventListener("change", () => {
    const file = imageInput.files[0];
    if (!file) return;
    showPreview(file);
    analyzeImage(file);
});

// --- INCOLLA DAGLI APPUNTI ---
document.addEventListener("paste", (event) => {
    const items = event.clipboardData.items;
    for (let item of items) {
        if (item.type.startsWith("image/")) {
            const blob = item.getAsFile();
            const file = new File([blob], "clipboard.png", { type: blob.type });

            // metti nel file input (così resta coerente)
            const dt = new DataTransfer();
            dt.items.add(file);
            imageInput.files = dt.files;

            showPreview(blob);
            analyzeImage(file);

            alert("📸 Immagine incollata e inviata in analisi!");
        }
    }
});

// --- COPIA PROMPT ---
document.getElementById("copyPromptBtn").addEventListener("click", async () => {
    const text = document.getElementById("generated_prompt").value;
    if (!text) {
        alert("Nessun prompt da copiare.");
        return;
    }
    await navigator.clipboard.writeText(text);
    alert("Prompt copiato negli appunti!");
});
</script>

</body>
</html>
