<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LuxuryVision Online</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>LuxuryVision Online</h1>
    </header>

    <main>
        <div class="upload-box">
            <form action="/process" method="POST" enctype="multipart/form-data">
                <label class="upload-area">
                    <input type="file" name="image" accept="image/*" required>
                    <span>Carica un'immagine</span>
                </label>

                <button type="submit" class="action-btn">Genera Prompt</button>
            </form>
        </div>

        {% if result %}
        <div class="result-box">
            <h2>Prompt Generato</h2>
            <p>{{ result }}</p>
        </div>
        {% endif %}
    </main>

</body>
</html>
