<div class="h-screen bg-[#121212] text-white flex flex-col p-6">
  <!-- Header -->
  <header class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-[#d4af37]">LuxuryVision</h1>
      <div class="flex space-x-8 text-sm">
          <span>1. Carica</span><span>2. Analisi IA</span><span>3. Modifica</span><span>4. Esporta</span>
      </div>
  </header>

  <!-- Main Grid Layout -->
  <div class="grid grid-cols-12 gap-6 flex-grow">
      <!-- Area Centrale (Main Workspace) -->
      <main class="col-span-8 bg-[#1e1e1e] rounded-2xl border border-gray-700 p-8 flex flex-col items-center justify-center">
          <div class="text-center mb-8">
              <h2 class="text-3xl font-bold mb-4">CARICA IMMAGINE</h2>
              <div id="dropZone" class="border-2 border-dashed border-[#d4af37] p-16 rounded-xl cursor-pointer">
                  <!-- Icona + testo -->
                  <p>Trascina & Rilascia, Incolla, o Sfoglia</p>
              </div>
          </div>
          <div class="space-y-4 w-full max-w-lg">
              <button class="w-full py-3 bg-[#d4af37] text-black font-bold rounded">INIZIA ANALISI IA (GEMINI)</button>
              <button class="w-full py-3 border border-[#d4af37] text-[#d4af37] font-bold rounded">RIORDINA & PULISCI (CLEANSCAPING)</button>
          </div>
      </main>

      <!-- Sidebar Destra (Controlli & Preset) -->
      <aside class="col-span-4 space-y-6">
          <!-- Pannello Controlli -->
          <div class="bg-[#1e1e1e] p-6 rounded-2xl border border-gray-700">
              <h3 class="text-sm font-bold text-[#d4af37] mb-4">AREA DI LAVORO CONTROLLI</h3>
              <!-- Qui inseriremo l'anteprima e i tasti icona -->
          </div>
          
          <!-- Pannello Preset -->
          <div class="bg-[#1e1e1e] p-6 rounded-2xl border border-gray-700">
              <h3 class="text-sm font-bold text-[#d4af37] mb-4">AREA DI LAVORO PRESET</h3>
              <!-- Area griglia 3 box -->
          </div>
      </aside>
  </div>
</div>
